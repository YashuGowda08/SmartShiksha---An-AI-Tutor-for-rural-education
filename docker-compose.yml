version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: smart_shiksha_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_shiksha
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: smart_shiksha_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smart_shiksha
    env_file:
      - ./backend/.env
    depends_on:
      - db
    volumes:
      - ./backend/app/uploads:/app/app/uploads

volumes:
  pgdata:
